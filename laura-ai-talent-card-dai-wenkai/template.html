<html lang="zh-CN">

  <meta name="theme-color" content="#0b1f3a">
  <meta name="description" content="Laura，专注 AI 与具身智能方向的人才寻访">

  <title>Laura | AI 与具身智能人才寻访</title>
  <style>
    :root {
      color-scheme: light dark;
      --canvas: #e8edf3;
      --paper: #f8fafc;
      --paper-strong: #ffffff;
      --ink: #0b1f3a;
      --body: #2c3d53;
      --muted: #68778b;
      --line: #cfdae7;
      --accent: #175a9f;
      --accent-strong: #0b3d72;
      --accent-soft: #e6f0fa;
      --button-ink: #f7fbff;
      --shadow: rgba(11, 31, 58, 0.1);
      --radius: 12px;
      --serif: "Palatino Linotype", "Book Antiqua", Palatino, "Songti SC", Georgia, serif;
      --sans: "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --canvas: #07101b;
        --paper: #0b1523;
        --paper-strong: #101d2e;
        --ink: #f0f5fb;
        --body: #c7d3e1;
        --muted: #91a1b5;
        --line: #293a50;
        --accent: #6faef0;
        --accent-strong: #9cc9f7;
        --accent-soft: #132b46;
        --button-ink: #07101b;
        --shadow: rgba(0, 0, 0, 0.28);
      }
    }

    * {
      box-sizing: border-box;
    }

    html {
      text-size-adjust: 100%;
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-width: 320px;
      min-height: 100dvh;
      background: var(--canvas);
      color: var(--body);
      font-family: var(--sans);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    a,
    button {
      -webkit-tap-highlight-color: transparent;
    }

    a {
      color: inherit;
    }

    button {
      font: inherit;
    }

    .site-shell {
      width: min(840px, calc(100% - 24px));
      margin: 12px auto;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: 0 20px 50px var(--shadow);
    }

    .masthead {
      min-height: 58px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 18px;
      padding: 0 28px;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      color: var(--ink);
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .masthead-note {
      margin: 0;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.08em;
      text-align: right;
      text-transform: uppercase;
    }

    .language-switch {
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper-strong);
    }

    .language-switch button {
      min-width: 43px;
      min-height: 30px;
      padding: 4px 9px;
      border: 0;
      border-radius: calc(var(--radius) - 3px);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .language-switch button[aria-pressed="true"] {
      background: var(--accent-strong);
      color: var(--button-ink);
    }

    .intro {
      padding: 36px 28px 32px;
    }

    .intro-copy {
      max-width: 690px;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--accent);
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1,
    h2,
    p {
      margin-top: 0;
    }

    h1 {
      max-width: 620px;
      margin-bottom: 20px;
      color: var(--ink);
      font-family: var(--serif);
      font-size: clamp(34px, 5.6vw, 48px);
      font-weight: 700;
      line-height: 1.08;
      letter-spacing: -0.035em;
    }

    .letter {
      max-width: 68ch;
      margin-bottom: 12px;
      color: var(--body);
      font-family: var(--serif);
      font-size: 15px;
      line-height: 1.72;
    }

    .intro-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    .button {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 15px;
      border: 1px solid var(--accent-strong);
      border-radius: var(--radius);
      background: var(--accent-strong);
      color: var(--button-ink);
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
      text-decoration: none;
      white-space: nowrap;
      cursor: pointer;
      transition: transform 150ms ease, background-color 150ms ease, border-color 150ms ease;
    }

    .button:hover {
      background: var(--accent);
      border-color: var(--accent);
    }

    .button:active {
      transform: translateY(1px);
    }

    .button.secondary {
      border-color: var(--line);
      background: transparent;
      color: var(--ink);
    }

    .button.secondary:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent-strong);
    }

    .profile-strip {
      display: grid;
      grid-template-columns: 1.05fr 1.25fr;
      gap: 30px;
      align-items: start;
      padding: 26px 28px;
      border-top: 1px solid var(--line);
      background: var(--paper-strong);
    }

    .profile-strip h2,
    .contact h2 {
      margin-bottom: 8px;
      color: var(--ink);
      font-family: var(--serif);
      font-size: clamp(25px, 3.6vw, 32px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .profile-strip p,
    .contact-heading p {
      margin-bottom: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    .focus-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 22px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .focus-list li {
      padding: 8px 0;
      border-bottom: 1px solid var(--line);
      color: var(--ink);
      font-family: var(--serif);
      font-size: 14px;
      font-weight: 700;
    }

    .contact {
      padding: 32px 28px;
      border-top: 1px solid var(--line);
    }

    .contact-heading {
      max-width: 620px;
      margin-bottom: 20px;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 14px;
    }

    .wechat-panel {
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr);
      gap: 15px;
      align-items: center;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper-strong);
    }

    .qr-image {
      width: 96px;
      height: 96px;
      display: block;
      object-fit: contain;
      padding: 5px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      cursor: zoom-in;
    }

    .contact-label {
      margin-bottom: 5px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .wechat-id {
      margin-bottom: 9px;
      color: var(--ink);
      font-family: var(--serif);
      font-size: 19px;
      font-weight: 700;
      line-height: 1.1;
      word-break: break-all;
    }

    .small-action {
      padding: 0;
      border: 0;
      border-bottom: 1px solid currentColor;
      border-radius: 0;
      background: transparent;
      color: var(--accent-strong);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }

    .channel-list {
      display: grid;
      gap: 8px;
    }

    .channel {
      min-height: 62px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 11px 15px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: inherit;
      text-decoration: none;
      transition: transform 150ms ease, border-color 150ms ease, background-color 150ms ease;
    }

    .channel:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .channel:active {
      transform: translateY(1px);
    }

    .channel strong {
      display: block;
      margin-bottom: 1px;
      color: var(--ink);
      font-family: var(--serif);
      font-size: 15px;
      line-height: 1.2;
    }

    .channel span {
      color: var(--muted);
      font-size: 10px;
      line-height: 1.4;
      word-break: break-word;
    }

    .channel-action {
      color: var(--accent-strong) !important;
      font-family: var(--mono);
      font-size: 9px !important;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      padding: 14px 28px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 10px;
    }

    .footer a {
      text-decoration-color: var(--line);
      text-underline-offset: 3px;
    }

    dialog {
      width: min(90vw, 380px);
      max-height: 90dvh;
      overflow: auto;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper-strong);
      color: var(--body);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
    }

    dialog::backdrop {
      background: rgba(4, 13, 26, 0.72);
      backdrop-filter: blur(4px);
    }

    .dialog-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 14px;
    }

    .dialog-head h2 {
      margin: 0;
      color: var(--ink);
      font-family: var(--serif);
      font-size: 23px;
    }

    .dialog-close {
      min-height: 34px;
      padding: 5px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: transparent;
      color: var(--ink);
      cursor: pointer;
    }

    .dialog-qr {
      width: 100%;
      height: auto;
      display: block;
      border-radius: var(--radius);
      background: #ffffff;
    }

    .dialog-note {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      z-index: 20;
      max-width: min(90vw, 500px);
      padding: 10px 14px;
      border: 1px solid #31577f;
      border-radius: var(--radius);
      background: #0b1f3a;
      color: #f7fbff;
      font-size: 12px;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 8px);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .toast.visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    :focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 3px;
    }

    @media (max-width: 680px) {
      .site-shell {
        width: calc(100% - 12px);
        margin: 6px auto;
      }

      .masthead {
        grid-template-columns: 1fr auto;
        gap: 12px;
        padding: 0 18px;
      }

      .masthead-note {
        display: none;
      }

      .intro {
        padding: 28px 18px 26px;
      }

      h1 {
        font-size: clamp(31px, 9.8vw, 40px);
      }

      .letter {
        font-size: 14px;
      }

      .intro-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .button {
        width: 100%;
        padding-inline: 10px;
      }

      .profile-strip {
        grid-template-columns: 1fr;
        gap: 18px;
        padding: 24px 18px;
      }

      .contact {
        padding: 28px 18px;
      }

      .contact-grid {
        grid-template-columns: 1fr;
      }

      .wechat-panel {
        grid-template-columns: 102px minmax(0, 1fr);
      }

      .qr-image {
        width: 102px;
        height: 102px;
      }

      .footer {
        flex-direction: column;
        gap: 4px;
        padding: 13px 18px;
      }
    }

    @media (max-width: 370px) {
      .intro-actions {
        grid-template-columns: 1fr;
      }

      .focus-list {
        grid-template-columns: 1fr;
      }

      .wechat-panel {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        transition-duration: 0.01ms !important;
      }
    }

    @media print {
      body {
        background: #ffffff;
      }

      .site-shell {
        width: 100%;
        margin: 0;
        border: 0;
        box-shadow: none;
      }

      .language-switch,
      .button,
      .small-action,
      .dialog-close,
      .toast {
        display: none !important;
      }
    }
  </style>
</head>

          close: "Close",
          toastCopied: "WeChat ID 15813001207 copied. Paste it into WeChat search.",
          toastFallback: "Please copy the WeChat ID manually: 15813001207.",
          emailSubject: "Exploring AI and Embodied Intelligence Opportunities",
          emailBody: "Hi Laura,\n\nThank you for reaching out. I would be interested in learning more about AI and embodied intelligence opportunities in China. Please feel free to share teams or roles that may fit my background.\n\nBest,\n"
        }
      };

      const dialog = document.querySelector("#qr-dialog");
      const toast = document.querySelector("#toast");
      const description = document.querySelector('meta[name="description"]');
      let currentLanguage = "zh";
      let toastTimer;

      function updateMailLinks(language) {
        const text = copy[language];
        const gmailUrl = "https://mail.google.com/mail/?view=cm&fs=1" +
          "&to=" + encodeURIComponent(gmail) +
          "&su=" + encodeURIComponent(text.emailSubject) +
          "&body=" + encodeURIComponent(text.emailBody);
        const mailtoUrl = "mailto:" + sina +
          "?subject=" + encodeURIComponent(text.emailSubject) +
          "&body=" + encodeURIComponent(text.emailBody);

        document.querySelector("#gmail-primary").href = gmailUrl;
        document.querySelector("#gmail-channel").href = gmailUrl;
        document.querySelector("#sina-channel").href = mailtoUrl;
      }

      function applyLanguage(language) {
        currentLanguage = language === "en" ? "en" : "zh";
        const text = copy[currentLanguage];
        document.documentElement.lang = currentLanguage === "zh" ? "zh-CN" : "en";
        document.body.dataset.lang = currentLanguage;
        document.title = "Laura | " + text.pageTitle;
        description.content = text.description;

        document.querySelectorAll("[data-i18n]").forEach((element) => {
          const key = element.dataset.i18n;
          if (text[key]) element.textContent = text[key];
        });

        document.querySelectorAll("[data-language]").forEach((button) => {
          button.setAttribute("aria-pressed", String(button.dataset.language === currentLanguage));
        });

        updateMailLinks(currentLanguage);
      }

      function showToast(message) {
        window.clearTimeout(toastTimer);
        toast.textContent = message;
        toast.classList.add("visible");
        toastTimer = window.setTimeout(() => toast.classList.remove("visible"), 3400);
      }

      async function copyText(text) {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return;
        }
        const input = document.createElement("textarea");
        input.value = text;
        input.setAttribute("readonly", "");
        input.style.position = "fixed";
        input.style.opacity = "0";
        document.body.appendChild(input);
        input.select();
        document.execCommand("copy");
        input.remove();
      }

      function showQrDialog() {
        if (typeof dialog.showModal === "function") {
          dialog.showModal();
        } else {
          dialog.setAttribute("open", "");
        }
      }

      async function openWeChat() {
        const text = copy[currentLanguage];
        try {
          await copyText(wechatId);
          showToast(text.toastCopied);
        } catch (error) {
          showToast(text.toastFallback);
        }

        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        if (isMobile) {
          window.location.href = "weixin://";
        } else {
          showQrDialog();
        }
      }

      document.querySelectorAll("[data-language]").forEach((button) => {
        button.addEventListener("click", () => applyLanguage(button.dataset.language));
      });

      document.querySelectorAll("[data-wechat-open]").forEach((button) => {
        button.addEventListener("click", openWeChat);
      });

      document.querySelectorAll("[data-qr-open]").forEach((image) => {
        image.addEventListener("click", showQrDialog);
        image.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            showQrDialog();
          }
        });
      });

      document.querySelector(".dialog-close").addEventListener("click", () => dialog.close());
      dialog.addEventListener("click", (event) => {
        const rect = dialog.getBoundingClientRect();
        const inside = event.clientX >= rect.left && event.clientX <= rect.right &&
          event.clientY >= rect.top && event.clientY <= rect.bottom;
        if (!inside) dialog.close();
      });

      const browserLanguage = navigator.language && navigator.language.toLowerCase().startsWith("zh") ? "zh" : "en";
      applyLanguage(browserLanguage);
    })();
  </script>
</body>
</html>
