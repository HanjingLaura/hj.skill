<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1f3a">
  <meta name="description" content="Laura，专注 AI 与具身智能方向的人才寻访">
  <link rel="icon" href="data:,">
  <title>Laura | AI 与具身智能人才寻访</title>
  <style>
    :root {
      color-scheme: light dark;
      --canvas: #e8edf3;
      --paper: #f8fafc;
      --paper-strong: #ffffff;
      --ink: #0b1f3a;
      --body: #2c3d53;
      --muted: #68778b;
      --line: #cfdae7;
      --accent: #175a9f;
      --accent-strong: #0b3d72;
      --accent-soft: #e6f0fa;
      --button-ink: #f7fbff;
      --shadow: rgba(11, 31, 58, 0.1);
      --radius: 12px;
      --serif: "Palatino Linotype", "Book Antiqua", Palatino, "Songti SC", Georgia, serif;
      --sans: "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --canvas: #07101b;
        --paper: #0b1523;
        --paper-strong: #101d2e;
        --ink: #f0f5fb;
        --body: #c7d3e1;
        --muted: #91a1b5;
        --line: #293a50;
        --accent: #6faef0;
        --accent-strong: #9cc9f7;
        --accent-soft: #132b46;
        --button-ink: #07101b;
        --shadow: rgba(0, 0, 0, 0.28);
      }
    }

    * {
      box-sizing: border-box;
    }

    html {
      text-size-adjust: 100%;
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-width: 320px;
      min-height: 100dvh;
      background: var(--canvas);
      color: var(--body);
      font-family: var(--sans);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    a,
    button {
      -webkit-tap-highlight-color: transparent;
    }

    a {
      color: inherit;
    }

    button {
      font: inherit;
    }

    .site-shell {
      width: min(840px, calc(100% - 24px));
      margin: 12px auto;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: 0 20px 50px var(--shadow);
    }

    .masthead {
      min-height: 58px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 18px;
      padding: 0 28px;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      color: var(--ink);
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .masthead-note {
      margin: 0;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.08em;
      text-align: right;
      text-transform: uppercase;
    }

    .language-switch {
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper-strong);
    }

    .language-switch button {
      min-width: 43px;
      min-height: 30px;
      padding: 4px 9px;
      border: 0;
      border-radius: calc(var(--radius) - 3px);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .language-switch button[aria-pressed="true"] {
      background: var(--accent-strong);
      color: var(--button-ink);
    }

    .intro {
      padding: 32px 28px 28px;
    }

    .intro-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 112px;
      gap: 28px;
      align-items: start;
    }

    .intro-copy {
      max-width: 620px;
    }

    h1,
    h2,
    p {
      margin-top: 0;
    }

    h1 {
      max-width: 620px;
      margin-bottom: 20px;
      color: var(--ink);
      font-family: var(--serif);
      font-size: clamp(30px, 5vw, 42px);
      font-weight: 700;
      line-height: 1.08;
      letter-spacing: -0.035em;
    }

    .letter {
      max-width: 58ch;
      margin-bottom: 10px;
      color: var(--body);
      font-family: var(--serif);
      font-size: 14px;
      line-height: 1.68;
    }

    .portrait-card {
      display: grid;
      justify-items: center;
      gap: 7px;
      padding-top: 4px;
      text-align: center;
    }

    .portrait-image {
      width: 76px;
      height: 76px;
      display: block;
      object-fit: cover;
      object-position: 24% 48%;
      border: 2px solid var(--paper-strong);
      border-radius: 50%;
      box-shadow: 0 0 0 1px var(--line), 0 8px 22px var(--shadow);
    }

    .portrait-name {
      color: var(--ink);
      font-family: var(--serif);
      font-size: 16px;
      line-height: 1;
    }

    .portrait-role {
      max-width: 110px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.45;
    }

    .intro-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    .button {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 15px;
      border: 1px solid var(--accent-strong);
      border-radius: var(--radius);
      background: var(--accent-strong);
      color: var(--button-ink);
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
      text-decoration: none;
      white-space: nowrap;
      cursor: pointer;
      transition: transform 150ms ease, background-color 150ms ease, border-color 150ms ease;
    }

    .button:hover {
      background: var(--accent);
      border-color: var(--accent);
    }

    .button:active {
      transform: translateY(1px);
    }

    .button.secondary {
      border-color: var(--line);
      background: transparent;
      color: var(--ink);
    }

    .button.secondary:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent-strong);
    }

    dialog {
      width: min(90vw, 380px);
      max-height: 90dvh;
      overflow: auto;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper-strong);
      color: var(--body);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
    }

    dialog::backdrop {
      background: rgba(4, 13, 26, 0.72);
      backdrop-filter: blur(4px);
    }

    .dialog-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 14px;
    }

    .dialog-head h2 {
      margin: 0;
      color: var(--ink);
      font-family: var(--serif);
      font-size: 23px;
    }

    .dialog-close {
      min-height: 34px;
      padding: 5px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: transparent;
      color: var(--ink);
      cursor: pointer;
    }

    .dialog-qr {
      width: 100%;
      height: auto;
      display: block;
      border-radius: var(--radius);
      background: #ffffff;
    }

    .dialog-note {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      z-index: 20;
      max-width: min(90vw, 500px);
      padding: 10px 14px;
      border: 1px solid #31577f;
      border-radius: var(--radius);
      background: #0b1f3a;
      color: #f7fbff;
      font-size: 12px;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 8px);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .toast.visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    :focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 3px;
    }

    @media (max-width: 680px) {
      .site-shell {
        width: calc(100% - 12px);
        margin: 6px auto;
      }

      .masthead {
        grid-template-columns: 1fr auto;
        gap: 12px;
        padding: 0 18px;
      }

      .masthead-note {
        display: none;
      }

      .intro {
        padding: 28px 18px 26px;
      }

      .intro-layout {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .intro-copy {
        grid-row: 2;
      }

      .portrait-card {
        grid-row: 1;
        grid-template-columns: 52px auto;
        justify-content: start;
        justify-items: start;
        align-items: center;
        gap: 3px 12px;
        padding: 0;
        text-align: left;
      }

      .portrait-image {
        width: 52px;
        height: 52px;
        grid-row: 1 / 3;
      }

      .portrait-role {
        max-width: none;
      }

      h1 {
        font-size: clamp(29px, 8.6vw, 36px);
      }

      .letter {
        font-size: 14px;
      }

      .intro-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .button {
        width: 100%;
        padding-inline: 10px;
      }

    }

    @media (max-width: 370px) {
      .intro-actions {
        grid-template-columns: 1fr;
      }

    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        transition-duration: 0.01ms !important;
      }
    }

    @media print {
      body {
        background: #ffffff;
      }

      .site-shell {
        width: 100%;
        margin: 0;
        border: 0;
        box-shadow: none;
      }

      .language-switch,
      .button,
      .dialog-close,
      .toast {
        display: none !important;
      }
    }
  </style>
</head>

        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return;
        }
        const input = document.createElement("textarea");
        input.value = text;
        input.setAttribute("readonly", "");

        input.style.opacity = "0";
        document.body.appendChild(input);
        input.select();
        document.execCommand("copy");
        input.remove();
