<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1f3a">
  <meta name="description" content="Laura，专注 AI 与具身智能方向的人才寻访">
  <link rel="icon" href="data:,">
  <title>Laura | AI 与具身智能人才寻访</title>
  <style>
    :root {
      color-scheme: light dark;
      --canvas: #e8edf3;
      --paper: #f8fafc;
      --paper-strong: #ffffff;
      --ink: #0b1f3a;
      --body: #2c3d53;
      --muted: #68778b;
      --line: #cfdae7;
      --accent: #175a9f;
      --accent-strong: #0b3d72;
      --accent-soft: #e6f0fa;
      --button-ink: #f7fbff;
      --shadow: rgba(11, 31, 58, 0.1);
      --radius: 12px;
      --serif: "Palatino Linotype", "Book Antiqua", Palatino, "Songti SC", Georgia, serif;
      --sans: "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --canvas: #07101b;
        --paper: #0b1523;
        --paper-strong: #101d2e;
        --ink: #f0f5fb;
        --body: #c7d3e1;
        --muted: #91a1b5;
        --line: #293a50;
        --accent: #6faef0;
        --accent-strong: #9cc9f7;
        --accent-soft: #132b46;
        --button-ink: #07101b;
        --shadow: rgba(0, 0, 0, 0.28);
      }
    }

    * {
      box-sizing: border-box;
    }

    html {
      text-size-adjust: 100%;
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-width: 320px;
      min-height: 100dvh;
      background: var(--canvas);
      color: var(--body);
      font-family: var(--sans);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    a,
    button {
      -webkit-tap-highlight-color: transparent;
    }

    a {
      color: inherit;
    }

    button {
      font: inherit;
    }

    .site-shell {
      width: min(840px, calc(100% - 24px));
      margin: 12px auto;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: 0 20px 50px var(--shadow);
    }

    .masthead {
      min-height: 58px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 18px;
      padding: 0 28px;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      color: var(--ink);
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .masthead-note {
      margin: 0;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.08em;
      text-align: right;
      text-transform: uppercase;
    }

    .language-switch {
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper-strong);
    }

    .language-switch button {
      min-width: 43px;
      min-height: 30px;
      padding: 4px 9px;
      border: 0;
      border-radius: calc(var(--radius) - 3px);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .language-switch button[aria-pressed="true"] {
      background: var(--accent-strong);
      color: var(--button-ink);
    }

    .intro {
      padding: 32px 28px 28px;
    }

    .intro-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 112px;
      gap: 28px;
      align-items: start;
    }

    .intro-copy {
      max-width: 620px;
    }

    h1,
    h2,
    p {
      margin-top: 0;
    }

    h1 {
      max-width: 620px;
      margin-bottom: 20px;
      color: var(--ink);
      font-family: var(--serif);
      font-size: clamp(30px, 5vw, 42px);
      font-weight: 700;
      line-height: 1.08;
      letter-spacing: -0.035em;
    }

    .letter {
      max-width: 58ch;
      margin-bottom: 10px;
      color: var(--body);
      font-family: var(--serif);
      font-size: 14px;
      line-height: 1.68;
    }

    .portrait-card {
      display: grid;
      justify-items: center;
      gap: 7px;
      padding-top: 4px;
      text-align: center;
    }

    .portrait-image {
      width: 76px;
      height: 76px;
      display: block;
      object-fit: cover;
      object-position: 24% 48%;
      border: 2px solid var(--paper-strong);
      border-radius: 50%;
      box-shadow: 0 0 0 1px var(--line), 0 8px 22px var(--shadow);
    }

    .portrait-name {
      color: var(--ink);
      font-family: var(--serif);
      font-size: 16px;
      line-height: 1;
    }

    .portrait-role {
      max-width: 110px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.45;
    }

    .intro-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    .button {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 15px;
      border: 1px solid var(--accent-strong);
      border-radius: var(--radius);
      background: var(--accent-strong);
      color: var(--button-ink);
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
      text-decoration: none;
      white-space: nowrap;
      cursor: pointer;
      transition: transform 150ms ease, background-color 150ms ease, border-color 150ms ease;
    }

    .button:hover {
      background: var(--accent);
      border-color: var(--accent);
    }

    .button:active {
      transform: translateY(1px);
    }

    .button.secondary {
      border-color: var(--line);
      background: transparent;
      color: var(--ink);
    }

    .button.secondary:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent-strong);
    }

    dialog {
      width: min(90vw, 380px);
      max-height: 90dvh;
      overflow: auto;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper-strong);
      color: var(--body);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
    }

    dialog::backdrop {
      background: rgba(4, 13, 26, 0.72);
      backdrop-filter: blur(4px);
    }

    .dialog-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 14px;
    }

    .dialog-head h2 {
      margin: 0;
      color: var(--ink);
      font-family: var(--serif);
      font-size: 23px;
    }

    .dialog-close {
      min-height: 34px;
      padding: 5px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: transparent;
      color: var(--ink);
      cursor: pointer;
    }

    .dialog-qr {
      width: 100%;
      height: auto;
      display: block;
      border-radius: var(--radius);
      background: #ffffff;
    }

    .dialog-note {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      z-index: 20;
      max-width: min(90vw, 500px);
      padding: 10px 14px;
      border: 1px solid #31577f;
      border-radius: var(--radius);
      background: #0b1f3a;
      color: #f7fbff;
      font-size: 12px;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 8px);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .toast.visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    :focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 3px;
    }

    @media (max-width: 680px) {
      .site-shell {
        width: calc(100% - 12px);
        margin: 6px auto;
      }

      .masthead {
        grid-template-columns: 1fr auto;
        gap: 12px;
        padding: 0 18px;
      }

      .masthead-note {
        display: none;
      }

      .intro {
        padding: 28px 18px 26px;
      }

      .intro-layout {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .intro-copy {
        grid-row: 2;
      }

      .portrait-card {
        grid-row: 1;
        grid-template-columns: 52px auto;
        justify-content: start;
        justify-items: start;
        align-items: center;
        gap: 3px 12px;
        padding: 0;
        text-align: left;
      }

      .portrait-image {
        width: 52px;
        height: 52px;
        grid-row: 1 / 3;
      }

      .portrait-role {
        max-width: none;
      }

      h1 {
        font-size: clamp(29px, 8.6vw, 36px);
      }

      .letter {
        font-size: 14px;
      }

      .intro-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .button {
        width: 100%;
        padding-inline: 10px;
      }

    }

    @media (max-width: 370px) {
      .intro-actions {
        grid-template-columns: 1fr;
      }

    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        transition-duration: 0.01ms !important;
      }
    }

    @media print {
      body {
        background: #ffffff;
      }

      .site-shell {
        width: 100%;
        margin: 0;
        border: 0;
        box-shadow: none;
      }

      .language-switch,
      .button,
      .dialog-close,
      .toast {
        display: none !important;
      }
    }
  </style>
</head>
<body data-lang="zh">
  <main class="site-shell">
    <header class="masthead">
      <div class="brand">Laura</div>
      <p class="masthead-note" data-i18n="masthead"></p>
      <div class="language-switch" role="group" aria-label="Language / 语言">
        <button type="button" data-language="zh" aria-pressed="true">中文</button>
        <button type="button" data-language="en" aria-pressed="false">EN</button>
      </div>
    </header>

    <section class="intro" aria-labelledby="intro-title">
      <div class="intro-layout">
        <div class="intro-copy">
          <h1 id="intro-title" data-i18n="title"></h1>
          <p class="letter" data-i18n="paragraph1"></p>
          <p class="letter" data-i18n="paragraph2"></p>
          <div class="intro-actions" aria-label="Contact actions">
            <a class="button" id="gmail-primary" href="#" target="_blank" rel="noopener noreferrer" data-i18n="gmailCta"></a>
            <button class="button secondary" type="button" data-wechat-open data-i18n="wechatCta"></button>
          </div>
        </div>
        <aside class="portrait-card" aria-label="Laura">
          <img class="portrait-image" src="__PROFILE_PHOTO__" alt="Laura at a SpaceX event" width="1254" height="1254">
          <strong class="portrait-name">Laura</strong>
          <span class="portrait-role" data-i18n="portraitRole"></span>
        </aside>
      </div>
    </section>

  </main>

  <dialog id="qr-dialog" aria-labelledby="qr-dialog-title">
    <div class="dialog-head">
      <h2 id="qr-dialog-title" data-i18n="dialogTitle"></h2>
      <button class="dialog-close" type="button" data-i18n="close"></button>
    </div>
    <img class="dialog-qr" src="__WECHAT_QR__" alt="Laura WeChat QR code enlarged" width="957" height="921">
    <p class="dialog-note" data-i18n="dialogNote"></p>
  </dialog>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    (() => {
      const wechatId = "15813001207";
      const gmail = "hanjinglaura@gmail.com";

      const copy = {
        zh: {
          pageTitle: "AI 与具身智能人才寻访",
          description: "Laura，专注 AI 与具身智能方向的人才寻访",
          masthead: "AI / 具身智能人才寻访",
          title: "聊聊更适合你的 AI 机会。",
          paragraph1: "我与中国领先科技公司和优秀创业团队合作，关注 AI 与具身智能方向的研究、工程及技术管理岗位。",
          paragraph2: "先了解你的兴趣与优势，再推荐真正相关的团队。",
          portraitRole: "AI 与具身智能猎头",
          gmailCta: "邮件联系",
          wechatCta: "添加微信",
          dialogTitle: "添加 Laura 的微信",
          dialogNote: "微信号 15813001207，长按识别或截图后扫码。",
          close: "关闭",
          toastCopied: "微信号 15813001207 已复制，请在微信搜索框粘贴。",
          toastFallback: "请手动复制微信号 15813001207。",
          emailSubject: "了解 AI 与具身智能方向机会",
          emailBody: "Laura 你好，\n\n感谢你的联系。我愿意进一步了解中国 AI 与具身智能方向的团队和机会。可以先和我分享与你认为匹配的岗位。\n\n谢谢！\n"
        },
        en: {
          pageTitle: "AI & Embodied Intelligence Search",
          description: "Laura, executive search for AI and embodied intelligence talent",
          masthead: "AI / EMBODIED INTELLIGENCE SEARCH",
          title: "AI opportunities that fit you better.",
          paragraph1: "I work with leading technology companies and strong startups in China across AI and embodied intelligence research, engineering and leadership roles.",
          paragraph2: "I first understand your interests and strengths, then share only the teams that fit.",
          portraitRole: "AI & Embodied Intelligence Recruiter",
          gmailCta: "Email me",
          wechatCta: "Add WeChat",
          dialogTitle: "Add Laura on WeChat",
          dialogNote: "WeChat ID 15813001207. Scan, long press or save the QR code.",
          close: "Close",
          toastCopied: "WeChat ID 15813001207 copied. Paste it into WeChat search.",
          toastFallback: "Please copy the WeChat ID manually: 15813001207.",
          emailSubject: "Exploring AI and Embodied Intelligence Opportunities",
          emailBody: "Hi Laura,\n\nThank you for reaching out. I would be interested in learning more about AI and embodied intelligence opportunities in China. Please feel free to share teams or roles that may fit my background.\n\nBest,\n"
        }
      };

      const dialog = document.querySelector("#qr-dialog");
      const toast = document.querySelector("#toast");
      const description = document.querySelector('meta[name="description"]');
      let currentLanguage = "zh";
      let toastTimer;

      function updateMailLinks(language) {
        const text = copy[language];
        const gmailUrl = "https://mail.google.com/mail/?view=cm&fs=1" +
          "&to=" + encodeURIComponent(gmail) +
          "&su=" + encodeURIComponent(text.emailSubject) +
          "&body=" + encodeURIComponent(text.emailBody);

        document.querySelector("#gmail-primary").href = gmailUrl;
      }

      function applyLanguage(language) {
        currentLanguage = language === "en" ? "en" : "zh";
        const text = copy[currentLanguage];
        document.documentElement.lang = currentLanguage === "zh" ? "zh-CN" : "en";
        document.body.dataset.lang = currentLanguage;
        document.title = "Laura | " + text.pageTitle;
        description.content = text.description;

        document.querySelectorAll("[data-i18n]").forEach((element) => {
          const key = element.dataset.i18n;
          if (text[key]) element.textContent = text[key];
        });

        document.querySelectorAll("[data-language]").forEach((button) => {
          button.setAttribute("aria-pressed", String(button.dataset.language === currentLanguage));
        });

        updateMailLinks(currentLanguage);
      }

      function showToast(message) {
        window.clearTimeout(toastTimer);
        toast.textContent = message;
        toast.classList.add("visible");
        toastTimer = window.setTimeout(() => toast.classList.remove("visible"), 3400);
      }

      async function copyText(text) {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return;
        }
        const input = document.createElement("textarea");
        input.value = text;
        input.setAttribute("readonly", "");
        input.style.position = "fixed";
        input.style.opacity = "0";
        document.body.appendChild(input);
        input.select();
        document.execCommand("copy");
        input.remove();
      }

      function showQrDialog() {
        if (typeof dialog.showModal === "function") {
          dialog.showModal();
        } else {
          dialog.setAttribute("open", "");
        }
      }

      async function openWeChat() {
        const text = copy[currentLanguage];
        try {
          await copyText(wechatId);
          showToast(text.toastCopied);
        } catch (error) {
          showToast(text.toastFallback);
        }

        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        if (isMobile) {
          window.location.href = "weixin://";
        } else {
          showQrDialog();
        }
      }

      document.querySelectorAll("[data-language]").forEach((button) => {
        button.addEventListener("click", () => applyLanguage(button.dataset.language));
      });

      document.querySelectorAll("[data-wechat-open]").forEach((button) => {
        button.addEventListener("click", openWeChat);
      });

      document.querySelectorAll("[data-qr-open]").forEach((image) => {
        image.addEventListener("click", showQrDialog);
        image.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            showQrDialog();
          }
        });
      });

      document.querySelector(".dialog-close").addEventListener("click", () => dialog.close());
      dialog.addEventListener("click", (event) => {
        const rect = dialog.getBoundingClientRect();
        const inside = event.clientX >= rect.left && event.clientX <= rect.right &&
          event.clientY >= rect.top && event.clientY <= rect.bottom;
        if (!inside) dialog.close();
      });

      const browserLanguage = navigator.language && navigator.language.toLowerCase().startsWith("zh") ? "zh" : "en";
      applyLanguage(browserLanguage);
    })();
  </script>
</body>
</html>
